name: 📍 Upload release assets

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name'
        required: true
        type: string
  release:
    types: [published]

jobs:
  build_and_release:
    # macOS runner is required to use xcodebuild
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build CLI Tool
        run: |
          xcodebuild -project "Valistream/Valistream/Valistream.xcodeproj" \
                     -scheme "Valistream" \
                     -configuration Release \
                     -derivedDataPath BuildData \
                     build
                     
      - name: Compress Binary
        run: |
          # Find binary in the build directory and zip it
          cd BuildData/Build/Products/Release/
          zip -r ../../../../valistream-cli.zip ./valistream

      - name: Create GitHub Release
        run: gh release upload ${{ github.event.release.tag_name || inputs.release_name }} ./valistream-cli.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
